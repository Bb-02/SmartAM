spring:
  application:
    name: SmartAM
  profiles:
    active: local

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/smartam?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT
jwt:
  # 生产环境通过环境变量覆盖: JWT_SECRET
  secret: smartam-jwt-secret-key-2026-min-256-bits!!
  expiration-ms: 86400000

server:
  port: 8080

logging:
  level:
    com.chengmaomao.smartam: debug
